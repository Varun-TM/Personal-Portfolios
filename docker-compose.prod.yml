version: '3.9'

services:
  # Next.js Portfolio Application (Production)
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: varun-portfolio-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME:-Varun TM}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://yourdomain.com}
      # --- Admin CMS credentials (required for /admin) ---
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      - AUTH_SECRET=${AUTH_SECRET:?set AUTH_SECRET in .env (min 16 chars)}
    volumes:
      # Persist editable content + uploaded images across rebuilds/restarts
      - portfolio_data:/app/data
      - portfolio_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network
    labels:
      - "com.varun.description=Varun TM - Cloud & DevOps Engineer Portfolio (Production)"
      - "com.varun.version=1.0.0"
      - "com.varun.environment=production"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Nginx Reverse Proxy with SSL (Production)
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      portfolio:
        condition: service_healthy
    networks:
      - portfolio-network
    labels:
      - "com.varun.description=Nginx reverse proxy for portfolio (Production)"

# Shared network for services
networks:
  portfolio-network:
    driver: bridge

# Named volumes for persistence
volumes:
  nginx-cache:
    driver: local
  # CMS content + uploads persistence
  portfolio_data:
    driver: local
  portfolio_uploads:
    driver: local
