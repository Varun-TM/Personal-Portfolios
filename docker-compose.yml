version: '3.9'

services:
  # Next.js Portfolio Application
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: varun-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME:-Varun TM}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    volumes:
      # Mount .next directory for hot reloading (optional, for development)
      # - ./.next:/app/.next
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network
    labels:
      - "com.varun.description=Varun TM - Cloud & DevOps Engineer Portfolio"
      - "com.varun.version=1.0.0"

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - portfolio
    networks:
      - portfolio-network
    labels:
      - "com.varun.description=Nginx reverse proxy for portfolio"

# Shared network for services
networks:
  portfolio-network:
    driver: bridge

# Volumes (if needed for persistence)
volumes:
  node_modules:
    driver: local
