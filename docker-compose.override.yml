# Docker Compose Override for Development
# This file is automatically loaded by docker-compose when it exists
# Use this for development-specific settings without modifying docker-compose.yml

version: '3.9'

services:
  portfolio:
    # Build from source for development
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development

    # Mount source code for hot reloading
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    # Run in development mode
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_DEBUG=true

    # Enable stdin/stdout for interactive debugging
    stdin_open: true
    tty: true

    # More verbose logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        labels: "service=portfolio,env=development"

  nginx:
    # Development nginx with simplified config
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # Don't require service health in dev
    depends_on:
      - portfolio
